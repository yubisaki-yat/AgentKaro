name: Keep Supabase Alive

on:
  schedule:
    # Har roz raat 12 baje chalega (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual run ke liye button

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/users?select=count" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
